services:
  postgres:
    image: postgres:16-alpine
    container_name: repobrain-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-repobrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-repobrain}
      POSTGRES_DB: ${POSTGRES_DB:-repobrain}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-repobrain} -d ${POSTGRES_DB:-repobrain}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: repobrain-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-repobrainpassword}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-repobrainpassword}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5-community
    container_name: repobrain-neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-repobrain123}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-repobrain123}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    container_name: repobrain-api
    restart: always
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-repobrain}:${POSTGRES_PASSWORD:-repobrain}@postgres:5432/${POSTGRES_DB:-repobrain}
      REDIS_URL: redis://:${REDIS_PASSWORD:-repobrainpassword}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-repobrainpassword}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-repobrainpassword}@redis:6379/2
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-repobrain123}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    env_file:
      - ../../.env
    volumes:
      - repo_data:/data/repos
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  worker:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    container_name: repobrain-worker
    restart: always
    command: ["sh", "-c", "celery -A app.workers.celery_app.celery_app worker --loglevel=info"]
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-repobrain}:${POSTGRES_PASSWORD:-repobrain}@postgres:5432/${POSTGRES_DB:-repobrain}
      REDIS_URL: redis://:${REDIS_PASSWORD:-repobrainpassword}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-repobrainpassword}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-repobrainpassword}@redis:6379/2
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-repobrain123}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    env_file:
      - ../../.env
    volumes:
      - repo_data:/data/repos
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../../
      dockerfile: infra/docker/web.Dockerfile
    container_name: repobrain-web
    restart: always
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 10s
      retries: 5
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  repo_data:
